name: "Enhancement"
description: "Suggest an improvement for AegisX"
title: "[Enhancement]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an AegisX improvement. Describe the user need, expected behavior, and any safety or license impact.
  - type: dropdown
    id: component
    attributes:
      label: Target component
      description: Which part of AegisX would this affect?
      multiple: true
      options:
        - Simple Mode
        - Advanced Mode
        - Shannon integration
        - Frontend UI
        - Backend API or services
        - Flow, task, or report handling
        - Docker, setup, or deployment
        - CI or GitHub workflow
        - Documentation
        - Security/Safety
        - Legal or third-party notices
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or user need
      description: What limitation or user workflow should this improve?
      placeholder: |
        Current limitation:
        -

        User affected:
        -

        Why it matters:
        -
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, UI, API, workflow, or documentation change you want.
      placeholder: |
        Proposed behavior:
        -

        Expected benefit:
        -

        Example workflow:
        -
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List other approaches you considered, if any.
      placeholder: |
        Alternative:
        -

        Tradeoff:
        -
    validations:
      required: false
  - type: textarea
    id: implementation
    attributes:
      label: Implementation notes
      description: Optional technical notes, affected files, dependencies, or migration concerns.
      placeholder: |
        Possible files or modules:
        -

        Dependencies:
        -

        Migration or compatibility concerns:
        -
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety and license review
      options:
        - label: I considered authorization and target ownership implications.
          required: true
        - label: I considered whether this affects non-production safeguards for scanning features.
          required: true
        - label: I considered whether this adds or changes third-party dependencies or license obligations.
          required: true
        - label: If this involves Shannon, I understand Shannon should remain an external integration unless maintainers approve a different license boundary.
          required: true
  - type: checkboxes
    id: verification
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues before opening this request.
          required: true
        - label: I described the expected benefit and affected workflow.
          required: true
