name: "Bug report"
description: "Report a reproducible problem in AegisX"
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a problem in AegisX. Provide enough detail for maintainers to reproduce the issue safely.
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      description: Which part of AegisX is affected?
      multiple: true
      options:
        - Simple Mode
        - Advanced Mode
        - Shannon integration
        - Frontend UI
        - Backend API or services
        - Flow, task, or report handling
        - Docker, setup, or deployment
        - CI or GitHub workflow
        - Documentation
        - Security/Safety
        - Legal or third-party notices
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: Include expected behavior, actual behavior, and any visible error.
      placeholder: |
        What happened:
        -

        What should have happened:
        -

        Error messages or UI state:
        -
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps from a clean checkout or deployment.
      placeholder: |
        1. Check out branch or commit:
        2. Start AegisX with:
        3. Open:
        4. Configure:
        5. Observe:
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide setup details with secrets removed.
      placeholder: |
        AegisX branch or commit:
        Deployment type: Docker Compose / custom / development
        Host OS:
        Docker version:
        Docker Compose version:
        Browser:
        LLM provider:
        Enabled integrations:
        Shannon enabled: yes / no
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and artifacts
      description: Paste relevant logs, browser console output, screenshots, or links to artifacts. Remove secrets and sensitive target data.
      placeholder: |
        ```
        Paste logs here
        ```
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      description: Required for reports involving scans, targets, exploits, or Shannon integration.
      options:
        - label: I own the target or have permission to test it, or this report does not involve a target.
          required: true
        - label: I removed secrets, credentials, tokens, private source code, and sensitive target data from this report.
          required: true
        - label: If this involves scanning, the target is non-production or explicitly authorized for this test.
          required: true
  - type: checkboxes
    id: verification
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues before opening this report.
          required: true
        - label: I included exact reproduction steps.
          required: true
        - label: I included relevant logs or explained why logs are not available.
          required: true
